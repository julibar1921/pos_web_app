<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glass Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #2b0f3a, #5a0f2e, #1b3c7a);
}

/* MAIN CARD */
.login-card {
    width: 340px;
    padding: 40px 30px;
    border-radius: 25px;
    backdrop-filter: blur(25px);
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    text-align: center;
    position: relative;
}

/* PROFILE ICON */
.avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    margin: 0 auto 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    color: rgba(255,255,255,0.6);
}

/* INPUT GROUP */
.input-group {
    position: relative;
    margin-bottom: 25px;
}

.input-group input {
    width: 100%;
    padding: 10px 35px;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.4);
    color: white;
    font-size: 14px;
    outline: none;
}

.input-group input::placeholder {
    color: rgba(255,255,255,0.6);
}

/* ICONS */
.input-group i {
    position: absolute;
    left: 5px;
    top: 10px;
    color: rgba(255,255,255,0.6);
}

/* OPTIONS ROW */
.options {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 25px;
}

.options input {
    margin-right: 5px;
}

/* BUTTON */
.login-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 15px;
    color: white;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    background: linear-gradient(90deg, #8a0c5c, #3f6df6);
    transition: 0.3s;
}

.login-btn:hover {
    opacity: 0.85;
}
</style>

<!-- ICONS (Font Awesome CDN) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="login-card">

    <div class="avatar">
        <i class="fa fa-user"></i>
    </div>

    <div class="input-group">
        <i class="fa fa-envelope"></i>
        <input type="text" placeholder="Email ID">
    </div>

    <div class="input-group">
        <i class="fa fa-lock"></i>
        <input type="password" placeholder="Password">
    </div>

    <div class="options">
        <label><input type="checkbox"> Remember me</label>
        <span style="cursor:pointer;">Forgot Password?</span>
    </div>

    <button class="login-btn">LOGIN</button>

</div>

</body>
</html>
